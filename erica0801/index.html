<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>何巧琳 老師 - 幼兒園遊戲互動傳送門 🏆</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Premium Ambient Sunset Glow Background -->
    <div class="tech-ambient">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Header Section -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-box">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <div class="title-box">
                    <span class="portal-badge"><i class="fa-solid fa-sparkles"></i> 巧琳老師專屬教學空間</span>
                    <h1 class="portal-title">幼兒園遊戲互動傳送門</h1>
                </div>
            </div>
            
            <!-- Controls & Search -->
            <div class="header-right">
                <div class="search-wrapper">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="gameSearch" placeholder="搜尋遊戲或工具..." onkeyup="filterGames()">
                </div>
            </div>
        </header>

        <!-- Category Tabs -->
        <nav class="view-tabs">
            <button class="tab-btn active" onclick="switchCategory('all', this)">
                <i class="fa-solid fa-cubes"></i> 全部內容
            </button>
            <button class="tab-btn" onclick="switchCategory('steam', this)">
                <i class="fa-solid fa-flask"></i> STEAM 探索
            </button>
            <button class="tab-btn" onclick="switchCategory('bopomofo', this)">
                <i class="fa-solid fa-address-card"></i> 注音與卡牌
            </button>
            <button class="tab-btn" onclick="switchCategory('adventure', this)">
                <i class="fa-solid fa-gamepad"></i> 動作與冒險
            </button>
            <button class="tab-btn" onclick="switchCategory('admin', this)">
                <i class="fa-solid fa-users-gear"></i> 班級與評估
            </button>
        </nav>

        <!-- Games Grid -->
        <main class="games-grid" id="gamesGrid">
            <!-- Cards will be dynamically generated by script.js -->
        </main>
    </div>

    <!-- Dynamic Game Player Overlay (Modal) -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-header">
            <h2 class="player-title" id="playerTitle">遊戲載入中...</h2>
            <button class="close-btn" onclick="closeGame()" title="關閉遊戲">
                <i class="fa-solid fa-xmark"></i> 關閉
            </button>
        </div>
        <div class="player-body">
            <iframe id="gameIframe" src="" allow="camera; microphone; geolocation; autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
