<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注音大冒險：AI 智慧強化版 Uno</title>
    <style>
        :root {
            --red: #ff5555;
            --blue: #5555ff;
            --green: #55aa55;
            --yellow: #ffaa00;
            --wild: #333;
            --purple: #8e44ad;
            --font-main: "Microsoft JhengHei", "微軟正黑體", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: white;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        /* 遊戲狀態欄 */
        #game-status {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.1rem;
            z-index: 10;
        }

        /* AI 助手面板 */
        #ai-panel {
            position: fixed;
            right: 20px;
            top: 70px;
            width: 280px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-height: 85vh;
            overflow-y: auto;
        }

        #ai-panel h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #f1c40f;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #ai-response {
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 50px;
            color: #ecf0f1;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 10px;
        }

        #ai-image-container {
            width: 100%;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            background: #34495e;
            aspect-ratio: 1/1;
        }

        #ai-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ai-btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-ai {
            background: var(--purple);
            font-size: 0.85rem;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-ai:hover { background: #9b59b6; filter: brightness(1.1); }
        .btn-ai:active { transform: scale(0.98); }

        /* 遊戲主桌面 */
        #table {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .deck-area {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .deck, .discard-pile {
            width: 110px;
            height: 160px;
            border-radius: 12px;
            border: 4px solid white;
            position: relative;
            background: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .deck {
            background: linear-gradient(135deg, #cc0000, #880000);
            cursor: pointer;
        }

        .deck::after {
            content: "注音";
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 卡片樣式 */
        .card {
            width: 110px;
            height: 160px;
            border-radius: 12px;
            border: 3px solid white;
            background: white;
            color: black;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .card.red { background-color: var(--red); color: white; }
        .card.blue { background-color: var(--blue); color: white; }
        .card.green { background-color: var(--green); color: white; }
        .card.yellow { background-color: var(--yellow); color: white; }
        .card.wild { background-color: var(--wild); color: white; }

        .card-top { align-self: flex-start; font-size: 1.1rem; font-weight: bold; }
        .card-center { 
            font-size: 2.5rem; 
            text-align: center; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            align-items: center;
        }
        .card-word { font-size: 0.9rem; margin-top: 5px; opacity: 0.9; }
        .card-bottom { align-self: flex-end; font-size: 1.1rem; font-weight: bold; transform: rotate(180deg); }

        /* 玩家手牌區域 */
        #player-hand-container {
            width: 100%;
            height: 200px;
            background: rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: auto;
        }

        #player-hand {
            display: flex;
            gap: -30px; 
        }

        #player-hand .card {
            margin-left: -40px;
        }
        #player-hand .card:first-child {
            margin-left: 0;
        }

        #player-hand .card:hover {
            transform: translateY(-40px) scale(1.1);
            z-index: 100;
        }

        /* 提示與訊息 */
        #message-box {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: #f1c40f;
            color: #2c3e50;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
            z-index: 1000;
            animation: fadeInOut 2s forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            20% { opacity: 1; transform: translate(-50%, 0); }
            80% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        /* 結束彈窗 */
        #end-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
        }

        .btn {
            background: #e67e22;
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { background: #d35400; }
        .btn:disabled { background: #7f8c8d; cursor: not-allowed; }

        #uno-button {
            position: absolute;
            right: 320px;
            bottom: 230px;
            background: #e74c3c;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 6px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            visibility: hidden;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            animation: pulse 1s infinite;
            z-index: 500;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .current-color-indicator {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* 滾動條樣式 */
        #ai-panel::-webkit-scrollbar { width: 5px; }
        #ai-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
    </style>
</head>
<body>

    <div id="game-status">
        <div>目前輪到：<span id="turn-display" style="color: #f1c40f;">玩家</span></div>
        <div>指定顏色：<span id="color-name">無</span><div id="color-dot" class="current-color-indicator"></div></div>
        <button class="btn" onclick="resetGame()" style="padding: 5px 15px; font-size: 0.9rem;">重開局</button>
    </div>

    <!-- AI 助手 -->
    <div id="ai-panel">
        <h3>✨ AI 智慧助教</h3>
        <div id="ai-response">哈囉！我是注音大冒險的 AI 助教。點點看下方的魔法按鈕吧！</div>
        <div id="ai-image-container"><img id="ai-generated-img" src="" alt="AI Generated"></div>
        <div class="ai-btn-group" style="margin-top: 15px;">
            <button class="btn btn-ai" onclick="aiSpeak()">✨ AI 語音示範</button>
            <button class="btn btn-ai" onclick="aiGenerateSentence()">✨ AI 魔法造句</button>
            <button class="btn btn-ai" onclick="aiStory()">✨ AI 聯想故事</button>
            <button class="btn btn-ai" onclick="aiVisual()">✨ AI 詞彙繪圖</button>
            <button class="btn btn-ai" onclick="aiExpandWords()">✨ AI 更多挑戰</button>
        </div>
    </div>

    <div id="ai-hand-info" style="position: absolute; top: 60px; left: 20px; background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 20px;">電腦手牌：<span id="ai-count" style="color: #e74c3c; font-weight: bold;">7</span> 張</div>

    <div id="table">
        <div class="deck-area">
            <div class="deck" id="main-deck" title="點擊抽牌"></div>
            <div class="discard-pile" id="discard-pile"></div>
        </div>
        
        <div id="uno-button" onclick="sayUno()">注音!</div>
    </div>

    <div id="player-hand-container">
        <div id="player-hand"></div>
    </div>

    <div id="message-box"></div>

    <div id="end-modal">
        <h2 id="end-title">遊戲結束</h2>
        <p id="end-message"></p>
        <button class="btn" onclick="resetGame()">再玩一局</button>
    </div>

    <script>
        // --- Gemini API 整合 ---
        const apiKey = ""; 

        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status === 429) { /* Rate limited, retry */ }
                    else throw new Error('API Error');
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                }
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
        }

        async function callGeminiText(prompt, systemInstruction) {
            const responseDiv = document.getElementById('ai-response');
            responseDiv.innerHTML = '<span class="loading-dots">AI 思考中</span>';
            
            try {
                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                responseDiv.innerText = text || "哎呀，連線失敗了。";
                return text;
            } catch (e) {
                responseDiv.innerText = "目前 AI 休息中，請稍後再試。";
            }
        }

        async function aiSpeak() {
            const topCard = discardPile[discardPile.length - 1];
            if (!topCard || topCard.type !== 'normal') return;
            
            const responseDiv = document.getElementById('ai-response');
            responseDiv.innerHTML = '<span class="loading-dots">AI 練習發音中</span>';
            
            try {
                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請用親切有趣的口吻說出：${topCard.char}，${topCard.word}` }] }],
                        generationConfig: { 
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        },
                        model: "gemini-2.5-flash-preview-tts"
                    })
                });

                const audioData = data.candidates[0].content.parts[0].inlineData.data;
                const mimeType = data.candidates[0].content.parts[0].inlineData.mimeType;
                const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000");

                const binaryString = atob(audioData);
                const pcmData = new Int16Array(binaryString.length / 2);
                for (let i = 0; i < pcmData.length; i++) {
                    pcmData[i] = (binaryString.charCodeAt(i * 2 + 1) << 8) | binaryString.charCodeAt(i * 2);
                }

                const wavBlob = pcmToWav(pcmData, sampleRate);
                const audio = new Audio(URL.createObjectURL(wavBlob));
                audio.play();
                responseDiv.innerText = `跟著老師唸唸看：${topCard.char} (${topCard.word})`;
            } catch (e) {
                responseDiv.innerText = "語音連線發生錯誤。";
            }
        }

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);
            for (let i = 0; i < pcmData.length; i++) view.setInt16(44 + i * 2, pcmData[i], true);
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function aiGenerateSentence() {
            const topCard = discardPile[discardPile.length - 1];
            if (!topCard || topCard.type !== 'normal') return;
            const sys = "你是一位充滿熱情的國語老師。請用提供的詞彙造一個兩三句的生動短故事或句子。";
            callGeminiText(`請用「${topCard.word}」造一個適合低年級學生的短句。`, sys);
        }

        async function aiStory() {
            // 抓取最後 3 張出的詞彙
            const lastCards = discardPile.filter(c => c.type === 'normal').slice(-3).map(c => c.word);
            if (lastCards.length < 2) {
                document.getElementById('ai-response').innerText = "請多出幾張注音牌，我才能幫你編故事喔！";
                return;
            }
            const sys = "你是一位說故事高手。請利用玩家提供的多個詞彙，編製一段 50 字以內的有趣、好笑的小故事。";
            callGeminiText(`請用這幾個詞彙編故事：${lastCards.join(', ')}`, sys);
        }

        async function aiVisual() {
            const topCard = discardPile[discardPile.length - 1];
            if (!topCard || topCard.type !== 'normal') return;
            
            const imgContainer = document.getElementById('ai-image-container');
            const imgEl = document.getElementById('ai-generated-img');
            const responseDiv = document.getElementById('ai-response');
            
            imgContainer.style.display = 'block';
            imgEl.style.opacity = '0.3';
            responseDiv.innerHTML = '<span class="loading-dots">✨ 正在召喚圖片</span>';

            try {
                const data = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        instances: { prompt: `A cute, colorful, high-quality 3D clay-style illustration of ${topCard.word} for kids educational app, white background` },
                        parameters: { sampleCount: 1 }
                    })
                });

                const imageUrl = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
                imgEl.src = imageUrl;
                imgEl.style.opacity = '1';
                responseDiv.innerText = `這是 AI 畫的：${topCard.word}！是不是很可愛？`;
            } catch (e) {
                imgContainer.style.display = 'none';
                responseDiv.innerText = "魔法圖片召喚失敗，請再試一次。";
            }
        }

        async function aiExpandWords() {
            const topCard = discardPile[discardPile.length - 1];
            if (!topCard || topCard.type !== 'normal') return;
            const sys = "你是一位注音字辭庫大師。請提供三個以指定注音開頭的挑戰詞彙，並附上注音。";
            callGeminiText(`請提供 3 個以「${topCard.char}」開頭的常用進階詞彙。`, sys);
        }

        // --- 遊戲邏輯 (同步更新) ---
        const bopomofoList = [
            { char: 'ㄅ', word: '包子', emoji: '🥟' }, { char: 'ㄆ', word: '蘋果', emoji: '🍎' },
            { char: 'ㄇ', word: '帽子', emoji: '👒' }, { char: 'ㄈ', word: '飛機', emoji: '✈️' },
            { char: 'ㄉ', word: '蛋糕', emoji: '🍰' }, { char: 'ㄊ', word: '太陽', emoji: '☀️' },
            { char: 'ㄋ', word: '牛奶', emoji: '🥛' }, { char: 'ㄌ', word: '老師', emoji: '👩‍🏫' },
            { char: 'ㄍ', word: '西瓜', emoji: '🍉' }, { char: 'ㄎ', word: '餅乾', emoji: '🍪' },
            { char: 'ㄏ', word: '河馬', emoji: '🦛' }, { char: 'ㄐ', word: '機器人', emoji: '🤖' },
            { char: 'ㄑ', word: '氣球', emoji: '🎈' }, { char: 'ㄒ', word: '小魚', emoji: '🐟' }
        ];

        const colors = ['red', 'blue', 'green', 'yellow'];
        const types = ['normal', 'normal', 'skip', 'reverse', 'plus2'];
        
        let deck = [], discardPile = [], playerHand = [], aiHand = [];
        let currentColor = '', currentBopomofo = '', gameActive = true, turn = 'player', hasSaidUno = false;

        function initGame() {
            gameActive = true;
            document.getElementById('end-modal').style.display = 'none';
            document.getElementById('ai-image-container').style.display = 'none';
            deck = [];
            
            colors.forEach(color => {
                bopomofoList.forEach(item => {
                    types.forEach(type => {
                        deck.push({
                            color: color,
                            char: type === 'normal' ? item.char : getActionSymbol(type),
                            word: type === 'normal' ? item.word : '',
                            emoji: type === 'normal' ? item.emoji : '',
                            type: type
                        });
                    });
                });
            });

            for(let i=0; i<4; i++) {
                deck.push({ color: 'wild', char: '★', word: '變色', type: 'wild' });
                deck.push({ color: 'wild', char: '+4', word: '挑戰', type: 'plus4' });
            }

            shuffle(deck);
            playerHand = deck.splice(0, 7);
            aiHand = deck.splice(0, 7);
            
            let firstCard = deck.pop();
            while(firstCard.type !== 'normal') {
                deck.unshift(firstCard);
                firstCard = deck.pop();
            }
            discardPile = [firstCard];
            currentColor = firstCard.color;
            currentBopomofo = firstCard.char;
            turn = 'player';
            hasSaidUno = false;
            updateUI();
        }

        function getActionSymbol(type) {
            if(type === 'skip') return '🚫';
            if(type === 'reverse') return '⇄';
            if(type === 'plus2') return '+2';
            return '';
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function updateUI() {
            document.getElementById('turn-display').innerText = turn === 'player' ? '玩家' : '電腦';
            document.getElementById('color-name').innerText = getColorName(currentColor);
            document.getElementById('color-dot').style.backgroundColor = `var(--${currentColor})`;
            document.getElementById('ai-count').innerText = aiHand.length;

            const topCard = discardPile[discardPile.length - 1];
            document.getElementById('discard-pile').innerHTML = renderCard(topCard);

            const playerHandEl = document.getElementById('player-hand');
            playerHandEl.innerHTML = '';
            playerHand.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.innerHTML = renderCard(card);
                cardEl.firstChild.onclick = () => playerPlayCard(index);
                playerHandEl.appendChild(cardEl.firstChild);
            });

            document.getElementById('uno-button').style.visibility = (playerHand.length === 2 && turn === 'player') ? 'visible' : 'hidden';
            
            if (playerHand.length === 1 && !hasSaidUno && turn === 'ai') {
                showMessage("😱 漏喊「注音」！罰抽 2 張");
                drawCard('player'); drawCard('player');
                hasSaidUno = true;
            }
        }

        function renderCard(card) {
            return `
                <div class="card ${card.color}">
                    <div class="card-top">${card.char}</div>
                    <div class="card-center">
                        <div>${card.char}</div>
                        <div class="card-word">${card.emoji} ${card.word}</div>
                    </div>
                    <div class="card-bottom">${card.char}</div>
                </div>
            `;
        }

        function getColorName(c) {
            const map = { 'red': '紅色', 'blue': '藍色', 'green': '綠色', 'yellow': '黃色', 'wild': '黑色' };
            return map[c] || c;
        }

        function playerPlayCard(index) {
            if (turn !== 'player' || !gameActive) return;
            const card = playerHand[index];
            if (canPlay(card)) {
                executePlay('player', index);
            } else {
                showMessage("❌ 這張不能出喔！");
            }
        }

        function canPlay(card) {
            const topCard = discardPile[discardPile.length - 1];
            return card.color === 'wild' || 
                   card.color === currentColor || 
                   (card.char !== '' && card.char === currentBopomofo);
        }

        function executePlay(playerType, index) {
            if (!gameActive) return;
            const hand = playerType === 'player' ? playerHand : aiHand;
            const card = hand.splice(index, 1)[0];
            discardPile.push(card);
            currentColor = card.color;
            currentBopomofo = card.char;

            if (card.color === 'wild') {
                if (playerType === 'player') {
                    const counts = {};
                    playerHand.forEach(c => { if(c.color !== 'wild') counts[c.color] = (counts[c.color] || 0) + 1; });
                    currentColor = Object.keys(counts).reduce((a, b) => (counts[a] || 0) > (counts[b] || 0) ? a : b, colors[0]);
                    showMessage("🌈 變色！目前為：" + getColorName(currentColor));
                } else {
                    currentColor = colors[Math.floor(Math.random() * colors.length)];
                }
            }

            if (hand.length === 0) {
                updateUI();
                setTimeout(() => endGame(playerType), 500);
                return;
            }

            let skipNext = false;
            if (card.type === 'skip') skipNext = true;
            if (card.type === 'plus2') {
                const target = playerType === 'player' ? 'ai' : 'player';
                drawCard(target); drawCard(target);
                skipNext = true;
            }
            if (card.type === 'plus4') {
                const target = playerType === 'player' ? 'ai' : 'player';
                for(let i=0; i<4; i++) drawCard(target);
                skipNext = true;
            }

            if (!skipNext) turn = playerType === 'player' ? 'ai' : 'player';
            else showMessage(playerType === 'player' ? "🚫 電腦被跳過" : "🚫 你被跳過了");

            updateUI();
            if (turn === 'ai' && gameActive) setTimeout(aiPlay, 1200);
        }

        function aiPlay() {
            if (!gameActive) return;
            let playableIndex = -1;
            for (let i = 0; i < aiHand.length; i++) {
                if (canPlay(aiHand[i])) { playableIndex = i; break; }
            }

            if (playableIndex !== -1) {
                if (aiHand.length === 2) showMessage("🤖 電腦大喊：注音！");
                executePlay('ai', playableIndex);
            } else {
                showMessage("☁️ 電腦沒牌，抽一張");
                drawCard('ai');
                turn = 'player';
                updateUI();
            }
        }

        document.getElementById('main-deck').onclick = () => {
            if (turn !== 'player' || !gameActive) return;
            drawCard('player');
            turn = 'ai';
            updateUI();
            setTimeout(aiPlay, 1200);
        };

        function drawCard(playerType) {
            if (deck.length === 0) {
                const top = discardPile.pop();
                deck = [...discardPile];
                shuffle(deck);
                discardPile = [top];
            }
            const card = deck.pop();
            if (playerType === 'player') playerHand.push(card);
            else aiHand.push(card);
            updateUI();
        }

        function sayUno() {
            if (playerHand.length === 2) {
                hasSaidUno = true;
                showMessage("📣 你大喊了：注音！");
                document.getElementById('uno-button').style.visibility = 'hidden';
            }
        }

        function showMessage(msg) {
            const box = document.getElementById('message-box');
            box.innerText = msg; box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 2000);
        }

        function endGame(winner) {
            gameActive = false;
            const modal = document.getElementById('end-modal');
            const title = document.getElementById('end-title');
            const message = document.getElementById('end-message');
            modal.style.display = 'flex';
            if (winner === 'player') {
                title.innerText = "🏆 恭喜獲勝！";
                title.style.color = "#f1c40f";
                message.innerText = "你是注音大師！成功出完所有卡片。";
            } else {
                title.innerText = "💻 電腦獲勝";
                title.style.color = "#e74c3c";
                message.innerText = "別灰心，下次一定會贏的！";
            }
        }

        function resetGame() { initGame(); }
        window.onload = initGame;
    </script>
</body>
</html>
