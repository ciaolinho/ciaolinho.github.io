<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知識閃卡工具</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-start: #f8fafc;
            --bg-end: #e2e8f0;
            --card-width: 380px;
            --card-height: 240px;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --card-shadow: rgba(148, 163, 184, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
        }

        /* Slide track container holding cards */
        .flashcard-window {
            width: var(--card-width);
            height: var(--card-height);
            perspective: 1000px;
            position: relative;
            margin-bottom: 24px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            cursor: pointer;
            border-radius: 24px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9) rotateY(0deg);
        }

        .flashcard.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) rotateY(0deg);
        }

        .flashcard.active.flipped {
            transform: scale(1) rotateY(180deg);
        }

        /* Front/Back Card Faces */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            box-shadow: 
                0 15px 35px var(--card-shadow),
                0 1px 3px rgba(0,0,0,0.05);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .card-front {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            color: #1e293b;
        }

        .card-back {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            color: #ffffff;
            transform: rotateY(180deg);
        }

        .category-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .card-front .category-badge {
            background: rgba(99, 102, 241, 0.08);
            color: var(--accent);
        }

        .card-back .category-badge {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .card-content-main {
            font-size: 38px;
            font-weight: 700;
            text-align: center;
            max-width: 90%;
            word-wrap: break-word;
        }

        .card-hint {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-back .card-hint {
            color: rgba(255, 255, 255, 0.65);
        }

        /* Navigation controls */
        .controls-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: var(--card-width);
            margin-bottom: 20px;
        }

        .nav-btn {
            background: #fff;
            border: 1px solid #cbd5e1;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #475569;
            box-shadow: 0 4px 10px rgba(148, 163, 184, 0.08);
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(99, 102, 241, 0.15);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .progress-text {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
        }

        /* Progress Dots */
        .dots-container {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--accent);
            width: 20px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1><span>🎴</span>知識閃卡工具</h1>
        <div class="subtitle">點擊卡片可進行 3D 翻轉，檢視背面答案</div>
    </header>

    <div class="flashcard-window" id="flashcardWindow">
        <!-- Card 1 -->
        <div class="flashcard active" onclick="flipCard(this)">
            <div class="card-face card-front">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">Apple</div>
                <div class="card-hint">🔄 點擊卡片翻面</div>
            </div>
            <div class="card-face card-back">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">蘋果</div>
                <div class="card-hint">🔄 點擊卡片翻回</div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="flashcard" onclick="flipCard(this)">
            <div class="card-face card-front">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">Nurse</div>
                <div class="card-hint">🔄 點擊卡片翻面</div>
            </div>
            <div class="card-face card-back">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">護理師</div>
                <div class="card-hint">🔄 點擊卡片翻回</div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="flashcard" onclick="flipCard(this)">
            <div class="card-face card-front">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">Health</div>
                <div class="card-hint">🔄 點擊卡片翻面</div>
            </div>
            <div class="card-face card-back">
                <span class="category-badge">Vocabulary</span>
                <div class="card-content-main">健康</div>
                <div class="card-hint">🔄 點擊卡片翻回</div>
            </div>
        </div>
    </div>

    <div class="controls-container">
        <button class="nav-btn" id="prevBtn" onclick="navigateCard(-1)" disabled>◀</button>
        <span class="progress-text" id="progressText">Card 1 of 3</span>
        <button class="nav-btn" id="nextBtn" onclick="navigateCard(1)">▶</button>
    </div>

    <div class="dots-container" id="dotsContainer">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <script>
        let currentIndex = 0;
        const cards = document.querySelectorAll('.flashcard');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressText = document.getElementById('progressText');
        const dotsContainer = document.getElementById('dotsContainer');

        // Audio synth trigger for flip sound
        let audioCtx = null;
        function playFlipSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } catch (e) {}
        }

        function flipCard(cardElement) {
            cardElement.classList.toggle('flipped');
            playFlipSound();
        }

        function navigateCard(direction) {
            // Unflip the current card before sliding away so that it returns to front side
            cards[currentIndex].classList.remove('flipped');
            cards[currentIndex].classList.remove('active');

            // Slide out logic can be done with simple active class
            currentIndex += direction;

            // Cap boundaries
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= cards.length) currentIndex = cards.length - 1;

            cards[currentIndex].classList.add('active');

            // Update UI widgets
            updateControls();
        }

        function updateControls() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === cards.length - 1;
            
            progressText.textContent = `Card ${currentIndex + 1} of ${cards.length}`;

            // Sync dots indicator
            const dots = dotsContainer.querySelectorAll('.dot');
            dots.forEach((dot, idx) => {
                if (idx === currentIndex) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
